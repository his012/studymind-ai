<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMind AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1a1a2e; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a4a; }
        .app-name { font-size: 18px; font-weight: 600; color: #7c6ef7; }
        .powered-by { font-size: 11px; color: #555; background: #1e1e3a; padding: 4px 10px; border-radius: 20px; border: 1px solid #2a2a4a; }
        .powered-by span { color: #7c6ef7; }
        .main { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 260px; background: #13131f; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; padding: 16px; gap: 16px; overflow-y: auto; }
        .sidebar label { font-size: 11px; color: #888; display: block; margin-bottom: 6px; }
        .sidebar input { width: 100%; padding: 8px 10px; background: #1e1e3a; border: 1px solid #2a2a4a; border-radius: 8px; color: #e0e0e0; font-size: 13px; }
        .sidebar-title { font-size: 11px; font-weight: 600; color: #7c6ef7; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
        .memory-list { display: flex; flex-direction: column; gap: 6px; }
        .memory-item { background: #1e1e3a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 8px 10px; font-size: 12px; }
        .memory-item .mem-type { font-size: 10px; color: #7c6ef7; margin-bottom: 3px; text-transform: uppercase; font-weight: 600; }
        .memory-item .mem-content { color: #ccc; line-height: 1.4; }
        .quiz-section { display: flex; flex-direction: column; gap: 6px; }
        .quiz-btn { padding: 8px; background: #2a2a4a; border: none; border-radius: 8px; color: #7c6ef7; font-size: 13px; cursor: pointer; }
        .quiz-btn:hover { background: #3a3a6a; }
        .load-btn { padding: 7px; background: transparent; border: 1px solid #2a2a4a; border-radius: 8px; color: #888; font-size: 12px; cursor: pointer; }
        .load-btn:hover { border-color: #7c6ef7; color: #7c6ef7; }
        .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .msg { display: flex; gap: 10px; align-items: flex-start; max-width: 75%; }
        .msg.user { align-self: flex-end; flex-direction: row-reverse; }
        .msg.ai { align-self: flex-start; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .msg.user .msg-avatar { background: #7c6ef7; }
        .msg.ai .msg-avatar { background: #1e1e3a; border: 1px solid #2a2a4a; }
        .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
        .msg.user .msg-bubble { background: #7c6ef7; color: white; border-radius: 14px 4px 14px 14px; }
        .msg.ai .msg-bubble { background: #1e1e3a; color: #e0e0e0; border-radius: 4px 14px 14px 14px; border: 1px solid #2a2a4a; }
        .welcome { text-align: center; padding: 40px 20px; color: #555; }
        .welcome .big-emoji { font-size: 48px; margin-bottom: 12px; }
        .welcome h2 { font-size: 20px; color: #888; margin-bottom: 8px; }
        .typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
        .typing span { width: 7px; height: 7px; background: #7c6ef7; border-radius: 50%; animation: bounce 1.2s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
        .input-area { padding: 16px 20px; background: #13131f; border-top: 1px solid #2a2a4a; display: flex; gap: 10px; align-items: flex-end; }
        .input-area textarea { flex: 1; background: #1e1e3a; border: 1px solid #2a2a4a; border-radius: 12px; padding: 12px 14px; color: #e0e0e0; font-size: 14px; resize: none; font-family: inherit; min-height: 44px; max-height: 120px; line-height: 1.5; outline: none; }
        .input-area textarea:focus { border-color: #7c6ef7; }
        .send-btn { width: 44px; height: 44px; background: #7c6ef7; border: none; border-radius: 12px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .send-btn:hover { background: #6a5de0; }
        .send-btn:disabled { background: #2a2a4a; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="header">
    <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:22px">🧠</span>
        <div>
            <div class="app-name">StudyMind AI</div>
            <div style="font-size:11px;color:#888">Persistent Memory Study Assistant</div>
        </div>
    </div>
    <div class="powered-by">Powered by <span>Qwen Cloud</span></div>
</div>

<div class="main">
    <div class="sidebar">
        <div style="background:#1e1e3a;border:1px solid #2a2a4a;border-radius:10px;padding:12px">
    <div style="font-size:11px;color:#888;margin-bottom:4px">YOUR UNIQUE ID</div>
    <div id="userIdDisplay" style="font-size:12px;color:#7c6ef7;font-family:monospace;word-break:break-all"></div>
    <div style="font-size:10px;color:#555;margin-top:4px">Auto-generated & saved on your device</div>
</div>
<button class="load-btn" onclick="loadMemories()">🔄 Load My Memories</button>
        <div>
            <div class="sidebar-title">📚 What I Remember</div>
            <div class="memory-list" id="memoryList">
                <div style="font-size:12px;color:#555;text-align:center;padding:10px">Click Load Memories to start</div>
            </div>
        </div>
        <div class="quiz-section">
            <div class="sidebar-title">📝 Quick Quiz</div>
            <input type="text" id="quizTopic" placeholder="e.g. Binary Trees">
            <button class="quiz-btn" onclick="getQuiz()">Generate Quiz ⚡</button>
        </div>
    </div>

    <div class="chat-area">
        <div class="chat-box" id="chatBox">
            <div class="welcome">
                <div class="big-emoji">🧠</div>
                <h2>Hi! I'm StudyMind AI</h2>
                <p>I remember your entire study journey across all sessions.<br>Tell me what you studied today!</p>
            </div>
        </div>
        <div class="input-area">
            <textarea id="msgInput" placeholder="Tell me what you studied today..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://localhost:8000";
    // Page load pe ID dikhao
window.onload = function() {
    const uid = getUserId();
    const display = document.getElementById("userIdDisplay");
    if (display) display.textContent = uid;
    loadMemories();
}

    function getUserId() {
    let uid = localStorage.getItem("studymind_uid");
    if (!uid) {
        uid = "student_" + Math.random().toString(36).substr(2, 9);
        localStorage.setItem("studymind_uid", uid);
    }
    return uid;
}
    function autoResize(el) { el.style.height = "auto"; el.style.height = Math.min(el.scrollHeight, 120) + "px"; }
    function handleKey(e) { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } }

    function addMessage(text, sender) {
        const chatBox = document.getElementById("chatBox");
        const welcome = chatBox.querySelector(".welcome");
        if (welcome) welcome.remove();
        const div = document.createElement("div");
        div.className = `msg ${sender}`;
        div.innerHTML = `<div class="msg-avatar">${sender === "user" ? "👤" : "🧠"}</div><div class="msg-bubble">${text.replace(/\n/g, "<br>")}</div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function showTyping() {
        const chatBox = document.getElementById("chatBox");
        const div = document.createElement("div");
        div.className = "msg ai"; div.id = "typing";
        div.innerHTML = `<div class="msg-avatar">🧠</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function removeTyping() { const t = document.getElementById("typing"); if (t) t.remove(); }

    async function sendMessage() {
        const input = document.getElementById("msgInput");
        const msg = input.value.trim();
        if (!msg) return;
        const sendBtn = document.getElementById("sendBtn");
        sendBtn.disabled = true;
        input.value = ""; input.style.height = "auto";
        addMessage(msg, "user");
        showTyping();
        try {
            const res = await fetch(`${API_URL}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ user_id: getUserId(), message: msg })
            });
            const data = await res.json();
            removeTyping();
            addMessage(data.response, "ai");
        } catch (err) {
            removeTyping();
            addMessage("⚠️ Backend se connect nahi ho raha! Terminal mein server chala raha hai?", "ai");
        }
        sendBtn.disabled = false;
    }

    async function loadMemories() {
        const list = document.getElementById("memoryList");
        list.innerHTML = `<div style="font-size:12px;color:#555;text-align:center">Loading...</div>`;
        try {
            const res = await fetch(`${API_URL}/memories/${getUserId()}`);
            const data = await res.json();
            if (!data.memories || data.memories.length === 0) {
                list.innerHTML = `<div style="font-size:12px;color:#555;text-align:center;padding:10px">No memories yet!</div>`;
                return;
            }
            const important = data.memories.filter(m => ["weak_topic","deadline","score","subject"].includes(m.type)).slice(0, 8);
            list.innerHTML = important.map(mem => `
                <div class="memory-item">
                    <div class="mem-type">${mem.type.replace("_"," ")}</div>
                    <div class="mem-content">${mem.content.substring(0,80)}...</div>
                </div>`).join("");
        } catch (err) {
            list.innerHTML = `<div style="font-size:12px;color:#e74c3c;padding:10px">Error loading!</div>`;
        }
    }

    let quizQuestions = [];
let currentQuestion = 0;
let quizTopic = "";

async function getQuiz() {
    const topic = document.getElementById("quizTopic").value.trim();
    if (!topic) { alert("Topic likho!"); return; }
    quizTopic = topic;
    addMessage(`📝 Starting quiz on: ${topic}`, "user");
    showTyping();
    try {
        const res = await fetch(`${API_URL}/quiz`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ user_id: getUserId(), topic: topic })
        });
        const data = await res.json();
        removeTyping();
        quizQuestions = data.quiz.questions || [];
        currentQuestion = 0;
        if (quizQuestions.length === 0) {
            addMessage("⚠️ Quiz generate nahi ho saka, try again!", "ai");
            return;
        }
        showQuestion();
    } catch (err) {
        removeTyping();
        addMessage("⚠️ Quiz generate nahi ho saka!", "ai");
    }
    document.getElementById("quizTopic").value = "";
}

function showQuestion() {
    if (currentQuestion >= quizQuestions.length) {
        addMessage("🎉 Quiz complete! Great job! Want another quiz?", "ai");
        return;
    }
    const q = quizQuestions[currentQuestion];
    const qNum = currentQuestion + 1;
    const total = quizQuestions.length;
    
    const chatBox = document.getElementById("chatBox");
    const div = document.createElement("div");
    div.className = "msg ai";
    div.id = "quiz-question";
    div.innerHTML = `
        <div class="msg-avatar">🧠</div>
        <div class="msg-bubble" style="width:100%">
            <div style="font-weight:600;margin-bottom:10px;color:#a78bfa">Question ${qNum}/${total}</div>
            <div style="margin-bottom:14px;font-size:14px">${q.q}</div>
            <div style="display:flex;flex-direction:column;gap:8px">
                ${Object.entries(q.options).map(([key, val]) => `
                    <button onclick="checkAnswer('${key}')" style="
                        text-align:left;padding:10px 14px;
                        background:#2a2a4a;border:1px solid #3a3a6a;
                        border-radius:8px;color:#e0e0e0;cursor:pointer;
                        font-size:13px;transition:background 0.2s"
                        id="opt-${key}"
                        onmouseover="this.style.background='#3a3a6a'"
                        onmouseout="this.style.background='#2a2a4a'">
                        <strong>${key})</strong> ${val}
                    </button>
                `).join("")}
            </div>
        </div>`;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function checkAnswer(selected) {
    const q = quizQuestions[currentQuestion];
    
    // Sab buttons disable karo
    ["A","B","C","D"].forEach(k => {
        const btn = document.getElementById(`opt-${k}`);
        if (btn) {
            btn.onclick = null;
            btn.style.cursor = "default";
            if (k === q.answer) {
                btn.style.background = "#166534";
                btn.style.borderColor = "#22c55e";
            } else if (k === selected && selected !== q.answer) {
                btn.style.background = "#7f1d1d";
                btn.style.borderColor = "#ef4444";
            }
        }
    });

    // Result message
    const isCorrect = selected === q.answer;
    const resultDiv = document.createElement("div");
    resultDiv.className = "msg ai";
    resultDiv.innerHTML = `
        <div class="msg-avatar">🧠</div>
        <div class="msg-bubble">
            <div style="font-size:15px;font-weight:600;margin-bottom:8px;color:${isCorrect ? '#22c55e' : '#ef4444'}">
                ${isCorrect ? '✅ Correct!' : `❌ Incorrect! You chose ${selected}, correct answer is ${q.answer}`}
            </div>
            <div style="font-size:13px;color:#ccc;line-height:1.6">${q.explanation}</div>
            <button onclick="nextQuestion()" style="
                margin-top:12px;padding:8px 16px;
                background:#7c6ef7;border:none;border-radius:8px;
                color:white;cursor:pointer;font-size:13px">
                ${currentQuestion + 1 < quizQuestions.length ? 'Next Question →' : 'Finish Quiz 🎉'}
            </button>
        </div>`;
    
    const chatBox = document.getElementById("chatBox");
    chatBox.appendChild(resultDiv);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function nextQuestion() {
    currentQuestion++;
    showQuestion();
}

</script>
</body>
</html>
